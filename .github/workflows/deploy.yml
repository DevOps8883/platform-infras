# Name of the workflow visible in the GitHub Actions tab
name: NexaCloud Deploy Pipeline

# Trigger this workflow only when code is pushed to the main branch
on:
  push:
    branches: [main]

jobs:
  # First job: Handles the application code and testing
  build:
    runs-on: ubuntu-latest
    steps:
      # Pulls the code from your repository into the runner
      - uses: actions/checkout@v3

      # Prepares the Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm' # Speeds up builds by caching node_modules    

      # Clean install of dependencies based on package-lock.json
      - name: Install dependencies 
        run: npm ci 

      # Executes the test suite
      - name: Run tests
        run: npm test

      # Set up Docker Buildx for optimized builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to your Docker Hub account
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} 

      # Build the image and push to Docker Hub with two tags: # 1. 'latest' for the newest version
      # 2. 'github.run_id' for a unique version history  
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./platform-infras/Dockerfile 
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexacloud-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nexacloud-app:${{ github.run_id }}    

  # Second job: Handles the deployment to AWS EKS
  deploy:
    needs: build # Only runs if the 'build' job finishes successfully
    runs-on: ubuntu-latest
    steps:
      # Pulls the code again to access the k8s/ folder files
      - uses: actions/checkout@v3

      # Logs into AWS using secrets stored in GitHub
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_ID }}
          aws-region: eu-west-1

      # Extra security to ensure AWS keys never appear in logs
      - name: Mask Sensitive Values
        run: |
          echo "::add-mask::$AWS_ACCESS_KEY_ID"
          echo "::add-mask::$AWS_SECRET_ACCESS_KEY"
          echo "::add-mask::$AWS_SESSION_TOKEN"    

      # Connects the runner to your specific EKS cluster
      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name nexacloud-cluster --region eu-west-1

      # Applies the Kubernetes manifest files to your cluster
      - name: Deploy to environment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRD }}
        run: |
          echo "Deploying with DATABASE_URL"

          # Create namespace if it does not exist
          kubectl create namespace nexacloud --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/


